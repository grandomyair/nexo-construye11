<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/login"></ion-back-button>
    </ion-buttons>
    <ion-title>Nueva contraseña</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  <div class="recuperar-card">
    <h2>Restablecer contraseña</h2>
    <p>Ingresa tu nueva contraseña</p>

    <ion-item>
      <ion-label position="floating">Nueva contraseña</ion-label>
      <ion-input type="password" [(ngModel)]="nuevaPassword"></ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="floating">Confirmar contraseña</ion-label>
      <ion-input type="password" [(ngModel)]="confirmarPassword"></ion-input>
    </ion-item>

    <ion-button expand="block" class="ion-margin-top"
      (click)="restablecer()" [disabled]="cargando">
      {{ cargando ? 'Guardando...' : 'Guardar contraseña' }}
    </ion-button>
  </div>
</ion-content>
