<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/nexo-home"></ion-back-button>
    </ion-buttons>
    <ion-title>
      Notificaciones
      <ion-badge *ngIf="noLeidas > 0" color="danger" class="badge-titulo">
        {{ noLeidas }}
      </ion-badge>
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">

  <div *ngIf="cargando" class="loading">
    <ion-spinner name="crescent"></ion-spinner>
  </div>

  <div *ngIf="!cargando && notificaciones.length === 0" class="empty">
    <ion-icon name="notifications-outline"></ion-icon>
    <p>No tienes notificaciones</p>
  </div>

  <div class="noti-list" *ngIf="!cargando && notificaciones.length > 0">
    <div *ngFor="let noti of notificaciones" class="noti-card" [class.no-leida]="!noti.leida" [style.background]="getBgColor(noti.tipo)">

      <div class="noti-icono-wrapper" [style.background]="getColor(noti.tipo) + '22'">
        <ion-icon [name]="getIcono(noti.tipo)" [style.color]="getColor(noti.tipo)"></ion-icon>
      </div>

      <div class="noti-body">
        <div class="noti-header-row">
          <span class="noti-titulo" [style.color]="getColor(noti.tipo)">
            {{ getTitulo(noti.tipo) }}
          </span>
          <span class="noti-dot" *ngIf="!noti.leida"></span>
        </div>
        <p class="noti-mensaje">{{ noti.mensaje }}</p>
        <p class="noti-fecha">{{ noti.fecha | date:'dd/MM/yyyy HH:mm' }}</p>

        <div class="noti-acciones" *ngIf="noti.tipo === 'reserva_nueva' && noti.reservacionId">
          <ion-button size="small" color="success" fill="solid" (click)="aceptarReserva(noti)">
            <ion-icon name="checkmark-circle-outline" slot="start"></ion-icon>
            Aceptar
          </ion-button>
          <ion-button size="small" color="danger" fill="outline" (click)="rechazarReserva(noti)">
            <ion-icon name="close-circle-outline" slot="start"></ion-icon>
            Rechazar
          </ion-button>
        </div>
      </div>

      <ion-button fill="clear" class="noti-delete" (click)="eliminarNotificacion(noti._id)">
        <ion-icon name="trash-outline" color="medium"></ion-icon>
      </ion-button>

    </div>
  </div>

  <footer class="nexo-footer">
  <div class="footer-inner">
    <img src="assets/Logos Labsol 2023-02.png" alt="Labsol" class="footer-logo-izq">
    <div class="footer-links">
      <div class="footer-col">
        <ul>
          <li (click)="Rutas('/politica-de-reservacion')">Política de reservación</li>
          <li (click)="Rutas('/politica-de-cancelacion')">Política de cancelación</li>
        </ul>
      </div>
      <div class="footer-col">
        <ul>
          <li (click)="Rutas('/acerca-de')">Acerca de</li>
        </ul>
      </div>
      <div class="footer-col">
        <ul>
          <li (click)="Rutas('/politica-de-privacidad')">Política de Privacidad</li>
          <li (click)="Rutas('/terminos-y-condiciones')">Términos y Condiciones</li>
        </ul>
      </div>
    </div>
    <img src="assets/GPLv3_Logo.svg.png" alt="GPLv3" class="footer-logo-der">
  </div>
</footer>

</ion-content>
